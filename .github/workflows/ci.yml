name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

permissions:
  contents: read

jobs:
  member-ci:
    name: CI (${{ matrix.member.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - name: alpha
            build_script: ''
            check_script: typecheck
            lint_go_script: ''
            lint_js_script: ''
            test_go_script: test:go:alpha
            test_js_script: test:js:alpha
          - name: auth
            build_script: ''
            check_script: ''
            lint_go_script: lint:go:auth
            lint_js_script: lint:js:auth
            test_go_script: test:go:auth
            test_js_script: test:js:auth
          - name: forge
            build_script: ''
            check_script: ''
            lint_go_script: lint:go:forge
            lint_js_script: lint:js:forge
            test_go_script: test:go:forge
            test_js_script: test:js:forge
          - name: net
            build_script: build:net
            check_script: ''
            lint_go_script: lint:go:net
            lint_js_script: lint:js:net
            test_go_script: test:go:net
            test_js_script: test:js:net
          - name: bldr
            build_script: ''
            check_script: bldr:typecheck
            lint_go_script: ''
            lint_js_script: ''
            test_go_script: ''
            test_js_script: ''
          - name: db
            build_script: ''
            check_script: ''
            lint_go_script: lint:go:db
            lint_js_script: lint:js:db
            test_go_script: test:go:db
            test_js_script: test:js:db
          - name: identity
            build_script: ''
            check_script: ''
            lint_go_script: lint:go:identity
            lint_js_script: lint:js:identity
            test_go_script: test:go:identity
            test_js_script: test:js:identity

    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Cache aptre tools
        uses: actions/cache@v5
        with:
          path: ./.tools
          key: ${{ runner.os }}-aptre-tools-${{ hashFiles('**/go.sum') }}

      - name: Setup aptre tools and vendor
        run: |
          go mod vendor
          bun run setup

      - name: Build Javascript
        if: ${{ matrix.member.build_script != '' }}
        run: bun run ${{ matrix.member.build_script }}

      - name: Run member checks
        if: ${{ matrix.member.check_script != '' }}
        run: bun run ${{ matrix.member.check_script }}

      - name: Test Go
        if: ${{ matrix.member.test_go_script != '' }}
        run: bun run ${{ matrix.member.test_go_script }}

      - name: Test Js
        if: ${{ matrix.member.test_js_script != '' }}
        run: bun run ${{ matrix.member.test_js_script }}

      - name: Lint Js
        if: ${{ matrix.member.lint_js_script != '' }}
        run: bun run ${{ matrix.member.lint_js_script }}

      - name: Lint Go
        if: ${{ matrix.member.lint_go_script != '' }}
        run: bun run ${{ matrix.member.lint_go_script }}

  licenses:
    name: Licenses
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Cache aptre tools
        uses: actions/cache@v5
        with:
          path: ./.tools
          key: ${{ runner.os }}-aptre-tools-${{ hashFiles('**/go.sum') }}

      - name: Setup aptre tools and vendor
        run: |
          go mod vendor
          bun run setup

      - name: Snapshot committed dependencies
        run: |
          mkdir -p .tmp
          jq '[.entries[] | {name, source}] | unique' \
            app/licenses/licenses.json > .tmp/committed-tuples.json

      - name: Generate licenses
        run: bun run licenses

      - name: Validate SPDX allowlist
        run: |
          allowed='["0BSD","Apache-2.0","Apache-2.0 OR MIT","BSD-2-Clause","BSD-3-Clause","CC0-1.0","ISC","MIT","MPL-2.0"]'
          unknown=$(jq --argjson allowed "$allowed" -r \
            '[.entries[].spdx] | unique - $allowed | .[]' \
            app/licenses/licenses.json)
          if [ -n "$unknown" ]; then
            echo "Disallowed SPDX licenses found in app/licenses/licenses.json:"
            echo "$unknown"
            echo
            echo "Allowed list (update .github/workflows/ci.yml if intentional):"
            echo "$allowed" | jq -r '.[]'
            exit 1
          fi

      - name: Validate no new dependencies
        run: |
          jq '[.entries[] | {name, source}] | unique' \
            app/licenses/licenses.json > .tmp/generated-tuples.json
          additions=$(jq -r --slurpfile c .tmp/committed-tuples.json \
            '. - $c[0] | .[] | "  \(.source)/\(.name)"' \
            .tmp/generated-tuples.json)
          if [ -n "$additions" ]; then
            echo "New dependencies present in generated app/licenses/licenses.json but not in the committed file:"
            echo "$additions"
            echo
            echo "Run 'bun run licenses' locally and commit the updated app/licenses/."
            exit 1
          fi
          if ! git diff --quiet -- app/licenses/; then
            echo "app/licenses/ is dirty after 'bun run licenses' but no new dependencies were added."
            echo "The licenses-update job on master will reconcile removals."
          fi

  e2e-go:
    name: E2E (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: bldr-comms
            script: test:go:e2e:bldr-comms
            needs_playwright: true
            playwright_browsers: chromium firefox webkit
          - name: alpha-core
            script: test:go:e2e:core
            needs_playwright: false
            playwright_browsers: ''
          - name: alpha-browser
            script: test:go:e2e:browser
            needs_playwright: true
            playwright_browsers: chromium
          - name: trace-service
            script: test:go:e2e:trace
            needs_playwright: false
            playwright_browsers: ''
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        if: ${{ matrix.suite.needs_playwright }}
        run: npx playwright install --with-deps ${{ matrix.suite.playwright_browsers }}

      - name: Cache aptre tools
        uses: actions/cache@v5
        with:
          path: ./.tools
          key: ${{ runner.os }}-aptre-tools-${{ hashFiles('**/go.sum') }}

      - name: Setup aptre tools and vendor
        run: |
          go mod vendor
          bun run setup

      - name: Run E2E suite
        run: bun run ${{ matrix.suite.script }}
