name: Licenses Update

on:
  push:
    branches: ['master']

permissions:
  contents: read

jobs:
  licenses-update:
    name: Update Licenses
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: licenses-update
    steps:
      - name: Create spacewave-ci app token
        id: spacewave_ci_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SPACEWAVE_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.SPACEWAVE_CI_APP_PRIVATE_KEY }}
          owner: s4wave
          repositories: spacewave
          permission-contents: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.spacewave_ci_app_token.outputs.token }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Cache aptre tools
        uses: actions/cache@v5
        with:
          path: ./.tools
          key: ${{ runner.os }}-aptre-tools-${{ hashFiles('**/go.sum') }}

      - name: Setup aptre tools and vendor
        run: |
          go mod vendor
          bun run setup

      - name: Generate licenses
        run: bun run licenses

      - name: Commit, verify determinism, push
        run: |
          if git diff --quiet -- app/licenses/; then
            echo "app/licenses/ is clean; nothing to commit."
            exit 0
          fi

          git config user.name "spacewave-ci[bot]"
          git config user.email "277994435+spacewave-ci[bot]@users.noreply.github.com"
          git add app/licenses/
          git commit -s -m "chore(licenses): update generated license data"

          bun run licenses
          if ! git diff --quiet -- app/licenses/; then
            echo "Non-deterministic license generation: app/licenses/ is dirty after a second 'bun run licenses'."
            git --no-pager diff -- app/licenses/
            exit 1
          fi

          git push origin HEAD:master
