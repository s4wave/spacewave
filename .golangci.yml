# Config file version V2 has been introduced, read more in lintersdb.
# Visit https://golangci-lint.run/usage/configuration/#config-file
version: '2'

run:
  concurrency: 4
  modules-download-mode: vendor

linters:
  enable:
    - depguard
    - gosec
    - importas
    - misspell
    - nonavigate
    - revive
    - unconvert
  disable:
    - errcheck
    - govet
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: io/ioutil
              desc: The io/ioutil package has been deprecated, see https://go.dev/doc/go1.16#ioutil
            - pkg: 'github.com/stretchr/testify/assert'
              desc: Use "gotest.tools/v3/assert" instead
            - pkg: 'github.com/stretchr/testify/require'
              desc: Use "gotest.tools/v3/assert" instead
            - pkg: 'github.com/stretchr/testify/suite'
              desc: Do not use
        no-encoding-json:
          deny:
            - pkg: encoding/json
              desc: >-
                Use protobuf-go-lite/json for proto types or
                aperturerobotics/fastjson for non-proto JSON.
                encoding/json uses reflection.
    gosec:
      excludes:
        - G306
    importas:
      no-unaliased: true
    custom:
      nonavigate:
        type: 'module'
        description: Forbids Harness.Navigate calls in e2e/wasm tests (destroys WASM process).
    revive:
      rules:
        - name: package-comments
          disabled: true
    staticcheck:
      checks:
        - all
        - '-SA1012'
        - '-ST1003'
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters: [nonavigate]
        path-except: 'e2e/wasm/'
    paths:
      - node_modules$
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - node_modules$
      - third_party$
      - builtin$
      - examples$
