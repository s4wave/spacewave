# Used as an example program while debugging / developing Bldr.
# type: project.ProjectConfig
id: bldr-demo
start:
  plugins:
    - bldr-demo
    - web
build:
  dist:
    manifests: ["web", "bldr-demo", "dist"]
    platformIds: ["native"]
  cross:
    manifests: ["web", "bldr-demo", "dist"]
    platformIds:
      - native/linux/amd64
      - native/windows/amd64
      - native/darwin/amd64
remotes:
  demo-dist:
    engineId: demo-dist
    objectKey: dist/demo
    hostConfigSet:
      demo-dist-bucket:
        id: hydra/bucket/setup
        config:
          applyBucketConfigs:
          - volumeIdList: ["devtool"]
            config: {'id': 'demo-dist'}
      demo-dist-world:
        id: hydra/world/block/engine
        config:
          engineId: demo-dist
          bucketId: demo-dist
          volumeId: devtool
          objectStoreId: demo-dist
          disableChangelog: true
          verbose: true
publish:
  demo-dist:
    remotes: ["demo-dist"]
    manifests: ["web", "bldr-demo", "dist"]
    storage:
      timestamp: "2023-04-27T08:39:53Z"
      # if empty: uses transform config from remote world
      transformConf:
        steps:
        - id: hydra/transform/s2
        - id: hydra/transform/blockenc
          config:
            blockEnc: BlockEnc_XCHACHA20_POLY1305
            # generate with: bifrost util generate-crypto-key
            # after changing: npm run clean
            key: zSEXvXfPi3zVCb2qJl3cN3EjCqzvxUts7aat/P4rZ/Q=
manifests:
  web:
    builder:
      id: bldr/web/plugin/compiler
      config: {}
        # delveAddr: wait
  bldr-demo:
    builder:
      id: bldr/plugin/compiler
      config:
        # delveAddr: wait
        goPkgs:
          - ./example
        # configure the configset to apply on startup
        configSet:
          demo-1:
            id: bldr/example/demo
            config: {}
          # TODO: add an option to plugin compiler to automatically configure the below.
          load-web:
            id: bldr/plugin/load
            config:
              pluginId: web
          # source LookupWebView calls from the HandleWebView calls
          web-view-observer:
            id: bldr/web/view/observer
            config: {}
          # handle incoming rpc requests to handle web views with HandleWebView
          web-view-handler-server:
            id: bldr/web/view/handler/server
            config: {}
          # configure the web plugin to handle web views via bldr-demo
          web-handle-view:
            id: bldr/web/plugin/handle-web-view
            config:
              webPluginId: web
              handlePluginId: bldr-demo
          # configure the web plugin to handle web view rpc calls via bldr-demo
          web-handle-view-rpc:
            id: bldr/web/plugin/handle-rpc
            config:
              webPluginId: web
              handlePluginId: bldr-demo
              serverIdRe: web-view/.*
          # configure the web plugin to handle web pkg lookups via bldr-demo
          web-handle-pkgs:
            id: bldr/web/plugin/handle-web-pkg
            config:
              webPluginId: web
              handlePluginId: bldr-demo
              webPkgIdList: ["react", "react-dom"]
        hostConfigSet:
          # configure the devtool to fetch demo-* plugins from bldr-demo
          fetch-plugin-via-bldr-demo:
            id: bldr/manifest/fetch/plugin
            config:
              pluginId: bldr-demo
              fetchManifestIdRe: demo-.*
  dist:
    builder:
      id: bldr/dist/compiler
      config:
        embedManifests:
        - web
        - bldr-demo
        loadPlugins:
        - bldr-demo
