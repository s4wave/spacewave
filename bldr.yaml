# Example: corresponds to ./example directory.
# Used as an example program while debugging / developing Bldr.
# bldr: project.ProjectConfig
start:
  loadPlugins:
    - bldr-demo
  configSet:
    # configure the devtool to handle web views via bldr-demo
    handle-webview-via-bldr-demo:
      id: bldr/plugin/host/handle-web-view
      config:
        pluginId: bldr-demo
    # configure the devtool to fetch demo-* plugins from bldr-demo
    fetch-plugin-via-bldr-demo:
      id: bldr/plugin/host/fetch/via-plugin
      config:
        pluginId: bldr-demo
        fetchPluginIdRegex: demo-.*
plugins:
  bldr-demo:
    id: bldr/plugin/compiler
    config:
      # configure delve
      # delveAddr: :9241
      # delveAddr: wait
      # configure the list of go packages to compile
      goPackages:
        # - github.com/aperturerobotics/bldr/example
        # Also accepts module paths relative to go.mod:
        - ./example
      # configure the configset to apply on startup
      configSet:
        demo-1:
          id: bldr/example/demo
          config: {}
