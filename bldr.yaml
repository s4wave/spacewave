# Used as an example program while debugging / developing Bldr.
# type: project.ProjectConfig
id: bldr-demo
start:
  plugins:
    - bldr-demo
    - web
build:
  dist:
    manifests: ["web", "bldr-demo", "dist"]
    platformIds: ["native"]
  cross:
    manifests: ["web", "bldr-demo", "dist"]
    platformIds:
      - native/linux/amd64
      - native/windows/amd64
      - native/darwin/amd64
remotes:
  demo-dist:
    engineId: demo-dist
    objectKey: dist/demo
    hostConfigSet:
      demo-dist-bucket:
        id: hydra/bucket/setup
        config:
          applyBucketConfigs:
          - volumeIdList: ["devtool"]
            config: {'id': 'demo-dist'}
      demo-dist-world:
        id: hydra/world/block/engine
        config:
          engineId: demo-dist
          bucketId: demo-dist
          volumeId: devtool
          objectStoreId: demo-dist
          disableChangelog: true
          verbose: true
publish:
  demo-dist:
    remotes: ["demo-dist"]
    manifests: ["web", "bldr-demo", "dist"]
    storage:
      # bifrost util timestamp
      timestamp: "2023-10-18T18:38:40Z"
      # if empty: uses transform config from remote world
      transformConf:
        steps:
        - id: hydra/transform/s2
        - id: hydra/transform/blockenc
          config:
            blockEnc: BlockEnc_XCHACHA20_POLY1305
            # generate with: bifrost util generate-crypto-key
            # after changing: npm run clean
            key: DEn7LStBTb2ZOP1mlLixkmPLg6x773/TQ1mnyyXJu1A=
manifests:
  web:
    builder:
      id: bldr/web/plugin/compiler
      config: {}
        # delveAddr: wait
  bldr-demo:
    builder:
      id: bldr/plugin/compiler
      config:
        # delveAddr: wait
        webPluginId: web
        goPkgs:
          - ./example
        # configure the configset to apply on startup
        configSet:
          demo-1:
            id: bldr/example/demo
            config: {}
        hostConfigSet:
          # configure the devtool to fetch demo-* plugins from bldr-demo
          fetch-plugin-via-bldr-demo:
            id: bldr/manifest/fetch/plugin
            config:
              pluginId: bldr-demo
              fetchManifestIdRe: demo-.*
  dist:
    builder:
      id: bldr/dist/compiler
      config:
        embedManifests:
        - web
        - bldr-demo
        loadPlugins:
        - bldr-demo
