# Example: corresponds to ./example directory.
# Used as an example program while debugging / developing Bldr.
# bldr: project.ProjectConfig
start:
  loadPlugins:
    - bldr-demo
  configSet:
    fetch-plugin-via-bldr-demo:
      id: bldr/plugin/host/fetch/via-plugin
      config:
        pluginId: bldr-demo
        fetchPluginIdRegex: demo-.*
plugins:
  bldr-demo:
    id: bldr/plugin/compiler
    config:
      goPackages:
        # - github.com/aperturerobotics/bldr/example
        # Also accepts module paths relative to go.mod:
        - ./example
      configSet:
        demo-1:
          id: bldr/example/demo
          config: {}
