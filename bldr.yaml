# Used as an example program while debugging / developing Bldr.
# type: project.ProjectConfig
id: bldr-demo
start:
  plugins:
    - bldr-demo
    - web
build:
  desktop:
    manifests: ["web", "bldr-demo"]
    platformIds: ["native"]
  web:
    manifests: ["web", "bldr-demo"]
    platformIds: ["web"]
manifests:
  web:
    builder:
      id: bldr/web/plugin/compiler
  bldr-demo:
    builder:
      id: bldr/plugin/compiler
      config:
        # delveAddr: wait
        goPackages:
          - ./example
          - github.com/aperturerobotics/bldr/web/plugin/handle-web-view
        # configure the configset to apply on startup
        configSet:
          demo-1:
            id: bldr/example/demo
            config: {}
          # configure the web plugin to handle web views via bldr-demo
          handle-webview-via-bldr-demo:
            id: bldr/web/plugin/handle-web-view
            config:
              webPluginId: web
              handlePluginId: bldr-demo
        hostConfigSet:
          # forward all web-view rpc requests to the plugin
          # TODO: should this be moved to be similar to handle-webview (above)?
          rpc-via-bldr-demo:
            id: bldr/plugin/host/forward-rpc-service
            config:
              pluginId: bldr-demo
              serverIdRegex: web-view/.*
          # configure the devtool to fetch demo-* plugins from bldr-demo
          fetch-plugin-via-bldr-demo:
            id: bldr/manifest/fetch/via-plugin
            config:
              pluginId: bldr-demo
              fetchManifestIdRegex: demo-.*
  dist-desktop:
    builder:
      id: bldr/dist/desktop
      config:
        embedManifests:
        - web
        - bldr-demo
        loadPlugins:
        - bldr-demo
