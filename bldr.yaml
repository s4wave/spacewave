# Used as an example program while debugging / developing Bldr.
# type: project.ProjectConfig
id: bldr-demo
start:
  plugins:
    - bldr-demo
    - web
build:
  dev:
    manifests:
      - web
      # - bldr-demo
    platformIds: ["native"]
  desktop:
    manifests: ["web", "bldr-demo"]
    platformIds: ["native/linux/amd64", "native/windows/arm64"]
  web:
    manifests: ["web", "bldr-demo"]
    platformIds: ["web"]
manifests:
  web:
    builder:
      id: bldr/web/plugin/compiler
      config: {}
        # delveAddr: wait
  bldr-demo:
    builder:
      id: bldr/plugin/compiler
      config:
        # delveAddr: wait
        goPackages:
          - ./example
        # configure the configset to apply on startup
        configSet:
          demo-1:
            id: bldr/example/demo
            config: {}
          # source LookupWebView calls from the HandleWebView calls
          web-view-observer:
            id: bldr/web/view/observer
            config: {}
          web-view-handler-server:
            id: bldr/web/view/handler/server
            config: {}
          # configure the web plugin to handle web views via bldr-demo
          web-handle-view:
            id: bldr/web/plugin/handle-web-view
            config:
              webPluginId: web
              handlePluginId: bldr-demo
          # configure the web plugin to handle rpc calls via bldr-demo
          web-handle-rpc:
            id: bldr/web/plugin/handle-rpc
            config:
              webPluginId: web
              handlePluginId: bldr-demo
              serverIdRegex: web-view/.*
        hostConfigSet:
          # configure the devtool to fetch demo-* plugins from bldr-demo
          fetch-plugin-via-bldr-demo:
            id: bldr/manifest/fetch/via-plugin
            config:
              pluginId: bldr-demo
              fetchManifestIdRegex: demo-.*
  dist-desktop:
    builder:
      id: bldr/dist/desktop
      config:
        embedManifests:
        - web
        - bldr-demo
        loadPlugins:
        - bldr-demo
