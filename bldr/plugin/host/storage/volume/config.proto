syntax = "proto3";
package bldr.plugin.host.storage.volume;

import "github.com/s4wave/spacewave/db/volume/controller/controller.proto";

// Config configures the plugin storage volume controller.
// Configures a storage_volume on the plugin host.
// Proxies to that storage volume with an RPC client.
message Config {
  // StorageId is the id to use to look up the storage on the plugin host bus.
  // defaults to "default" if unset
  string storage_id = 1;
  // StorageVolumeId is the id to pass to the storage constructor for the volume.
  // e.x. my-app-dist
  string storage_volume_id = 2;
  // VolumeConfig is the base volume controller config.
  // Some fields are ignored / cleared before transmitting to the plugin host.
  // - volume id alias: used in the plugin but not the plugin host.
  .volume.controller.Config volume_config = 3;
}
