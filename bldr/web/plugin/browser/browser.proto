syntax = "proto3";
package bldr.web.plugin.browser;

import "github.com/aperturerobotics/starpc/rpcstream/rpcstream.proto";

// WebPluginBrowserHost proxies requests to the web plugin to the plugin host.
// accessed by web/plugin/browser/web-plugin-browser.ts
service WebPluginBrowserHost {
  // PluginRpc handles an incoming RPC call from a remote plugin for the web plugin.
  // Id: remote plugin id
  rpc PluginRpc(stream .rpcstream.RpcStreamPacket) returns (stream .rpcstream.RpcStreamPacket);
}
