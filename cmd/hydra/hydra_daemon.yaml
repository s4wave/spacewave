cli-bolt-volume-0:
  config:
    path: data.boltdb
    verbose: true
  id: hydra/volume/bolt/1
  revision: 1
pubsub:
  config: {}
  id: bifrost/floodsub/1
  revision: 1
udp:
  config:
    dialers: {}
    listenAddr: :5112
  id: bifrost/udp/1
  revision: 1
# create sample bucket
mkbucket:
  config:
    applyBucketConfigs:
    - volumeIdRe: '.*'
      config:
        id: example-bucket-1
        version: 1
  id: hydra/bucket/setup/1
  revision: 1
# configure data exchange for it via pubsub signaling
dex:
  config:
    bucketId: example-bucket-1
    pubsubChannel: example-psecho-1-ch
  id: hydra/dex/psecho/1
  revision: 1
# example of a hydra world engine
world-example:
  config:
    engineId: example-1
    bucketId: example-bucket-1
  id: hydra/world/block/engine/1
  revision: 1
