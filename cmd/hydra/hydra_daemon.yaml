cli-bolt-volume-0:
  config:
    path: ./data.boltdb
    volumeConfig:
      volumeIdAlias:
      - hydra/volume/default
  id: hydra/volume/bolt
dex:
  config:
    bucketId: example-bucket-1
    pubsubChannel: example-psecho-1-ch
  id: hydra/dex/psecho
mkbucket:
  config:
    applyBucketConfigs:
    - config:
        id: example-bucket-1
        version: 1
      # volumeIdRe: .*
      volumeIdList: ["hydra/volume/default"]
  id: hydra/bucket/setup
  rev: 1
pubsub:
  config: {}
  id: bifrost/floodsub
  rev: 1
udp:
  config:
    dialers: {}
    listenAddr: :5112
  id: bifrost/udp
  rev: 1
world-example:
  config:
    bucketId: example-bucket-1
    engineId: example-1
  id: hydra/world/block/engine
  rev: 1
