// -- WebSocket frame envelopes --

// SsoCallbackResult is the SSO callback payload pushed to the auth-session
// WebSocket after an OAuth provider redirect. Mirrors the cloud SSOResult
// shape on the wire.
message SsoCallbackResult {
  // Linked indicates the SSO identity was matched to an existing account.
  bool linked = 1;
  // Provider is the SSO provider name ("google" or "github").
  string provider = 2;
  // Email is the OAuth provider email, when available.
  string email = 3;
  // Sub is the provider-specific subject identifier.
  string sub = 4;
  // AccountId is the matched cloud account ULID, when linked.
  string account_id = 5;
  // EntityId is the cloud username, when linked.
  string entity_id = 6;
  // Username is the suggested username, for new-account flows.
  string username = 7;
  // EncryptedBlob is the entity key encrypted to the device pubkey or to a
  // PIN-derived key, depending on flow.
  string encrypted_blob = 8;
  // PinWrapped indicates the encrypted blob is wrapped with a PIN-derived key.
  bool pin_wrapped = 9;
  // AuthParams is the base64-encoded authentication parameters.
  string auth_params = 10;
  // Error is a human-readable error message, when the callback failed.
  string error = 11;
  // DeviceEncrypted indicates the encrypted blob is encrypted to a device key.
  bool device_encrypted = 12;
}

// PasskeyRelay is the server-pushed passkey result for the auth-session
// WebSocket. Wraps the concrete passkey result type in a oneof.
message PasskeyRelay {
  oneof relay {
    DesktopPasskeyLinkedResult linked = 1;
    DesktopPasskeyNewAccountResult new_account = 2;
    DesktopPasskeyRelayResult relay_result = 3;
    DesktopPasskeyRegisterResult register_result = 4;
    DesktopPasskeyRegisterRelayResult register_relay = 5;
    DesktopPasskeyReauthResult reauth_result = 6;
    DesktopPasskeyReauthRelayResult reauth_relay = 7;
  }
}

// WsAuthSessionServerFrame is the server-to-client envelope for
// /api/auth/session/ws. Exactly one oneof case is populated per frame.
message WsAuthSessionServerFrame {
  oneof body {
    .session.handoff.HandoffCompletion completion = 1;
    SsoCallbackResult sso_callback = 2;
    PasskeyRelay passkey_relay = 3;
    DesktopSSOLinkResult sso_link = 4;
  }
}

// WsBillingCheckoutServerFrame is the server-to-client envelope for
// /api/billing/checkout/ws. Exactly one oneof case is populated per frame.
message WsBillingCheckoutServerFrame {
  oneof body {
    CheckoutStatusMessage status = 1;
  }
}
