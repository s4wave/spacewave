syntax = "proto3";
package spacewave.launcher;

// DistConfig is the encoded and signed object that is exposed on the
// distribution URL endpoints. The config with the highest valid revision field
// and valid signature is accepted as the latest config.
//
// Usually encoded with packedmsg(peer.SignedMsg(DistConfig))
message DistConfig {
  // ProjectId is the identifier of the project.
  // usually matches the id: field in the project config.
  // if this doesn't match the app config is ignored.
  string project_id = 1;
  // Rev is the revision of this app config object.
  uint64 rev = 2;

  // ChannelKey selects the release channel this DistConfig targets.
  string channel_key = 8;

  // Reserved field numbers. Previously:
  //   3 -> map<string, ControllerConfig> launcher_config_set
  //   4 -> string entrypoint_version
  //   5 -> map<string, EntrypointAsset> entrypoint_assets
  //   6 -> string plugin_version
  //   7 -> map<string, PluginAsset> plugin_assets
  reserved 3, 4, 5, 6, 7;
  reserved "launcher_config_set", "entrypoint_version", "entrypoint_assets",
    "plugin_version", "plugin_assets";
}

// LauncherInfo contains information about the state of the launcher.
message LauncherInfo {
  // DistConfig contains the latest app dist config object.
  // May be empty if the config is not known / fetched yet.
  DistConfig dist_config = 1;
  // UpdateState describes the entrypoint update state.
  UpdateState update_state = 2;
}

// UpdateState describes the current state of an entrypoint self-update.
message UpdateState {
  // Phase is the current update phase.
  UpdatePhase phase = 1;
  // Version is the target update version.
  string version = 2;
  // DownloadProgress is download progress percentage (0-100).
  uint32 download_progress = 3;
  // StagedPath is the path to the staged binary (when phase is STAGED).
  string staged_path = 4;
  // ErrorMessage contains any error message.
  string error_message = 5;
}

// UpdatePhase is the phase of the entrypoint update.
enum UpdatePhase {
  // UpdatePhase_IDLE means no update in progress.
  UpdatePhase_IDLE = 0;
  // UpdatePhase_DOWNLOADING means the update is being downloaded.
  UpdatePhase_DOWNLOADING = 1;
  // UpdatePhase_STAGED means the update is downloaded and ready to install.
  UpdatePhase_STAGED = 2;
  // UpdatePhase_APPLYING means the update is being applied.
  UpdatePhase_APPLYING = 3;
  // UpdatePhase_ERROR means an error occurred.
  UpdatePhase_ERROR = 4;
}

service Launcher {
  rpc WatchLauncherInfo(WatchLauncherInfoRequest) returns (stream LauncherInfo) {}
  rpc PushDistConfigMsg(PushDistConfigRequest) returns (PushDistConfigResponse) {}
  rpc RecheckDistConfig(RecheckDistConfigRequest) returns (RecheckDistConfigResponse) {}
  rpc ApplyUpdate(ApplyUpdateRequest) returns (ApplyUpdateResponse) {}
}

// RecheckDistConfigRequest is a request to immediately recheck for updates.
message RecheckDistConfigRequest {}

// RecheckDistConfigRequest is a response to immediately recheck for updates.
// Returned immediately
message RecheckDistConfigResponse {}

// WatchLauncherInfoRequest is the request to get the launcher info.
message WatchLauncherInfoRequest {}

// PushDistConfigRequest is the request to push an app dist config signed message.
message PushDistConfigRequest {
  // Body is the block of text containing the packedmsg.
  // We will scan the body of message for a valid signed packedmsg.
  string body = 1;
}

// PushDistConfigResponse is the response to PushDistConfigRequest.
message PushDistConfigResponse {
  // Valid indicates that a valid packedmsg was found in the body.
  bool valid = 1;
  // Updated indicates that the found packedmsg is now the latest.
  // Will be false if valid=false.
  bool updated = 2;
  // Rev was the revision of the found app config object. 0 if none.
  uint64 rev = 3;
  // PrevRev was the revision of the old app config object. 0 if none.
  uint64 prev_rev = 4;
}

// ApplyUpdateRequest is a request to apply a staged update.
message ApplyUpdateRequest {}

// ApplyUpdateResponse is the response to ApplyUpdateRequest.
// If successful, the process will be relaunched and this response may not arrive.
message ApplyUpdateResponse {}
