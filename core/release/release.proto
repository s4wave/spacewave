syntax = "proto3";
package release;

import "github.com/s4wave/spacewave/db/block/block.proto";

// ChannelDirectory lists the public release channels in a release Space.
message ChannelDirectory {
  // Channels is the list of named release channels.
  repeated ChannelEntry channels = 1;
}

// ChannelEntry points one channel key at a release manifest.
message ChannelEntry {
  // ChannelKey is the stable channel identifier, such as stable or canary.
  string channel_key = 1;
  // ReleaseManifestRef references the ReleaseManifest for this channel.
  .block.BlockRef release_manifest_ref = 2;
}

// ReleaseManifest describes one promoted application release.
message ReleaseManifest {
  // ProjectId is the project identifier this release belongs to.
  string project_id = 1;
  // Rev is the monotonic release revision.
  uint64 rev = 2;
  // Version is the human-readable application version.
  string version = 3;
  // Entrypoints maps platform keys to entrypoint manifest refs.
  map<string, ManifestRef> entrypoints = 4;
  // Plugins maps plugin IDs to plugin manifest refs.
  map<string, ManifestRef> plugins = 5;
  // BrowserShell references the browser shell manifest.
  ManifestRef browser_shell = 6;
  // MinimumLauncherVersion is the minimum launcher version that can read this
  // release.
  string minimum_launcher_version = 7;
}

// ManifestRef identifies a manifest object by content ref.
message ManifestRef {
  // Ref is the manifest object's block ref.
  .block.BlockRef ref = 1;
}

// EntrypointManifest describes a native entrypoint update artifact.
message EntrypointManifest {
  // Platform is the GOOS/GOARCH platform key.
  string platform = 1;
  // Version is the entrypoint version.
  string version = 2;
  // ArchiveRef references the archive bytes in the release world.
  .block.BlockRef archive_ref = 3;
  // Size is the archive size in bytes.
  uint64 size = 4;
  // Sha256 is the SHA-256 digest of the archive bytes.
  bytes sha256 = 5;
  // ArchiveName is the release archive filename.
  string archive_name = 6;
}

// PluginManifest describes a plugin release artifact.
message PluginManifest {
  // PluginId is the released plugin identifier.
  string plugin_id = 1;
  // Version is the plugin release version.
  string version = 2;
  // ManifestRef references the plugin's bldr manifest object.
  .block.BlockRef manifest_ref = 3;
  // ArtifactRef references an optional plugin artifact bundle.
  .block.BlockRef artifact_ref = 4;
}

// BrowserShellManifest describes the browser entrypoint shell for a release.
message BrowserShellManifest {
  // Version is the browser shell version.
  string version = 1;
  // GenerationId is the browser generation identifier.
  string generation_id = 2;
  // EntrypointPath is the app-facing entrypoint script path.
  string entrypoint_path = 3;
  // ServiceWorkerPath is the service worker path.
  string service_worker_path = 4;
  // SharedWorkerPath is the shared worker path.
  string shared_worker_path = 5;
  // WasmPath is the Go runtime WASM path.
  string wasm_path = 6;
  // Assets is the set of shell assets.
  repeated BrowserAsset assets = 7;
}

// BrowserAsset describes one browser shell asset.
message BrowserAsset {
  // Path is the app-facing asset path.
  string path = 1;
  // ContentRef references the asset bytes in the release world.
  .block.BlockRef content_ref = 2;
  // Size is the asset size in bytes.
  uint64 size = 3;
  // Sha256 is the SHA-256 digest of the asset bytes.
  bytes sha256 = 4;
  // ContentType is the HTTP content type to serve.
  string content_type = 5;
  // CacheControl is the HTTP Cache-Control value to serve.
  string cache_control = 6;
}

// UpdateNotification describes a newly available release root.
message UpdateNotification {
  // ChannelKey is the release channel that changed.
  string channel_key = 1;
  // InnerSeqno is the SORoot inner_seqno of the observed public root.
  uint64 inner_seqno = 2;
  // RootPointerUrl is the URL of the root.packedmsg that produced this
  // notification.
  string root_pointer_url = 3;
}
