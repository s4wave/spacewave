syntax = "proto3";
package space.sobject;

import "github.com/aperturerobotics/util/backoff/backoff.proto";

// Config configures the space shared object controller.
// Handles MountSharedObjectBody directives by starting the sobject/world controller.
message Config {
  // Verbose logs all operation results as debug messages.
  bool verbose = 1;

  // ProcessOpsBackoff is the backoff for processing ops as a validator.
  // Defaults to reasonable defaults if unset.
  .backoff.Backoff process_ops_backoff = 2;
}
