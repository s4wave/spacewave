syntax = "proto3";
package api;

import "github.com/aperturerobotics/hydra/cid/cid.proto";
import "github.com/aperturerobotics/hydra/bucket/bucket.proto";
import "github.com/aperturerobotics/hydra/bucket/event/event.proto";
import "github.com/aperturerobotics/hydra/volume/volume.proto";

// ListVolumesRequest looks up tracked volumes.
message ListVolumesRequest {
}

// ListVolumesResponse returns tracked volumes.
message ListVolumesResponse {
  // Volumes is the list of volumes returned from the request.
  repeated volume.VolumeInfo volumes = 1;
}

// ListBucketsResponse returns tracked buckets.
message ListBucketsResponse {
  // Buckets is the list of buckets returned from the request.
  repeated volume.VolumeBucketInfo buckets = 1;
}

// PutBucketConfigRequest requests running volumes ingest a bucket config.
message PutBucketConfigRequest {
  // Config is the bucket config.
  bucket.Config config = 1;
  // VolumeIdRegex is the regex of volume IDs to apply the bucket to.
  // If empty, will only apply to volumes that already have the bucket.
  string volume_id_regex = 2;
}

// PutBucketConfigResponse returns results of the request.
message PutBucketConfigResponse {
  // ApplyConfResult is a result value for the application.
  bucket.ApplyBucketConfigResult apply_conf_result = 1;
}

// PutBlockRequest is the request type for PutBlock.
message PutBlockRequest {
  // BucketId is the bucket ID to put the block into.
  string bucket_id = 1;
  // VolumeIdRegex is the regex of volume IDs to put the block into.
  // If empty, will only apply to volumes that have the bucket.
  string volume_id_regex = 2;
  // PutOpts are overriding put options.
  // Defaults are specified by the bucket.
  bucket.PutOpts put_opts = 3;
  // Data is the data to put in the block.
  // May be constrained by the bucket block size limit.
  bytes data = 4;
}

// PutBlockResponse is the response type for PutBlock.
// One response is returned for each volume.
message PutBlockResponse {
  // Event is the put block event.
  bucket.event.PutBlock event = 1;
}

// GetBlockRequest is the request type for GetBlock.
message GetBlockRequest {
  // BucketId is the bucket ID to put the block into.
  string bucket_id = 1;
  // VolumeIdRe is the regex of volume IDs to get the block from.
  // If empty, will select all volumes with the bucket.
  string volume_id_re = 2;
  // BlockRef is the block ref to lookup.
  cid.BlockRef block_ref = 3;
  // TODO lookup concurrent vs waterfall. default: concurrently check all local
  // buckets for the data, if it is in multiple, perform extra lookups.
}

// GetBlockResponse is the response type for GetBlock.
message GetBlockResponse {
  // BlockRef is the block ref looked up.
  cid.BlockRef block_ref = 1;
  // BucketId is the bucket ID that was used.
  string bucket_id = 2;
  // Found indicates if the block was found
  bool found = 3;
  // VolumeId is the volume ID that was matched.
  string volume_id = 4;
  // Data is the data if the block was matched.
  bytes data = 5;
}


// HydraDaemonService is the control service for a daemon, contacted by the CLI.
service HydraDaemonService {
  // ListVolumes lists volumes tracked by the daemon.
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse) {}
  // ListBuckets lists buckets tracked by the daemon.
  rpc ListBuckets(volume.ListBucketsRequest) returns (ListBucketsResponse) {}
  // PutBucketConfig requests the system ingest a bucket config.
  rpc PutBucketConfig(PutBucketConfigRequest) returns (stream PutBucketConfigResponse) {}
  // PutBlock puts a block into a bucket.
  rpc PutBlock(PutBlockRequest) returns (stream PutBlockResponse) {}
  // GetBlock gets a block from a bucket.
  rpc GetBlock(GetBlockRequest) returns (GetBlockResponse) {}
}
