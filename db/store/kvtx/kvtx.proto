syntax = "proto3";
package store.kvtx;

import "github.com/s4wave/spacewave/net/hash/hash.proto";
import "github.com/s4wave/spacewave/db/kvtx/mqueue/mqueue.proto";

// Config is the configuration for the kvtx store.
message Config {
  // MqueueConfig is the kvtx mqueue configuration.
  // Note: some stores override the mqueue implementation.
  .kvtx.mqueue.Config mqueue_config = 1;
  // HashType is the hash type to use for block refs.
  // If unset (0 value) will use default for Hydra (BLAKE3).
  .hash.HashType hash_type = 2;
  // DisableHashGet disables hashing values for Get requests.
  // This improves performance if the underlying store is trusted & consistent.
  //
  // If the store may return invalid data or mismatch the requested block ref,
  // do not enable this option. It is important to hash the data for each read.
  bool disable_hash_get = 3;
}

// MqueueMeta contains message queue metadata.
message MqueueMeta {
  // Id is the message queue id.
  bytes id = 1;
}

// BucketReconcilerMqueueId is the message queue identifier.
//
// Encoded -> b58.
message BucketReconcilerMqueueId {
  string bucket_id = 1;
  string reconciler_id = 2;
}
