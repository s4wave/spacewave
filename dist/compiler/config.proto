syntax = "proto3";
package bldr.dist.compiler;

import "github.com/aperturerobotics/controllerbus/controller/configset/proto/configset.proto";
import "github.com/aperturerobotics/bldr/util/enabled/enabled.proto";

// Config configures the dist compiler controller.
//
// Builds an unpacked distribution bundle of the application.
// Contains compressed & embedded static manifests for first-run.
message Config {
  // EmbedManifests is the list of manifest IDs to embed in the dist binary.
  // Creates a ManifestStore with the latest versions of each manifest.
  // The manifest contents will be embedded in the dist binary.
  repeated string embed_manifests = 1;

  // LoadPlugins is the list of plugins to load on startup.
  // Note that plugins can also load other plugins with the LoadPlugin directive.
  // Use this to load your entrypoint plugin which then loads other plugins.
  // This will be included in the dist binary.
  repeated string load_plugins = 2;

  // LoadWebStartup is a path to a .js or .ts or .tsx file with a React component to load on startup.
  // Must be a relative path located within the project sources.
  // The file will be bundled with esbuild into the entrypoint bundle.
  // The component should contain a <WebView /> from @aptre/bldr-react.
  // The contents will be used for the children of BldrRoot.
  string load_web_startup = 8;

  // HostConfigSet is a ConfigSet to apply to the host on dist startup.
  // This ConfigSet is applied to the dist host bus on startup.
  // This will be included in the dist binary.
  map<string, .configset.proto.ControllerConfig> host_config_set = 3;

  // ProjectId overrides the project id set in the project config.
  string project_id = 4;

  // EnableCgo enables cgo in the Go compiler.
  //
  // Cgo is disabled by default as it may cause non-reproducible builds.
  // https://github.com/golang/go/issues/57120#issuecomment-1420752516
  //
  // Cgo may still be force-disabled if incompatible with the target (wasm, tinygo).
  .enabled.Enabled enable_cgo = 5;

  // EnableTinygo enables using TinyGo instead of the Go compiler in some circumstances.
  // Currently TinyGo fails to build Bldr due to missing implementation internally.
  // Once compatible, the default will be to use tinygo for the web platform in release mode.
  // Only applicable for the web platform (WebAssembly) (currently).
  // NOTE: Currently disabled on default.
  .enabled.Enabled enable_tinygo = 6;

  // EnableCompression can optionally force-enable or force-disable binary compression.
  // The default is ENABLE for release-mode only.
  // Only applicable for the web platform (WebAssembly) (currently).
  .enabled.Enabled enable_compression = 7;
}

// PreBuildHookResult is the output of a pre-build hook.
message PreBuildHookResult {
  // Config is the configuration for the dist build step.
  // Merged with the existing configuration.
  Config config = 1;
}
