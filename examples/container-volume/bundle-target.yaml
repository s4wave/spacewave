repo-bldr:
  inputs: []
  outputs:
    - name: repo
      outputType: OutputType_EXEC
      execOutput: "repo"
  exec:
    controller:
      config:
        objectKey: "repo/bldr"
        cloneOpts:
          url: "../../"
        worktreeOpts:
          objectKey: "repo/bldr/worktree"
          workdirRef:
            objectKey: "repo/bldr/workdir"
          createWorkdir: true
      id: forge/lib/git/clone/1

yarn:
  inputs:
  - name: workdir
    inputType: InputType_WORLD_OBJECT
    worldObject:
      objectKey: repo/bldr/workdir
      objectRev: 1
  outputs: []
  exec:
    controller:
      id: forge/lib/containers/pod/1
      config:
        engineId: podman/client
        volumeInputs:
          workdir: workdir
        pod:
          spec: |
            restartPolicy: Never
            volumes:
            - name: workdir
              csi:
                driver: aperture.app/hydra/unixfs
            containers:
            - name: yarn
              image: docker.io/library/node:latest
              workingDir: /src
              volumeMounts:
              - name: workdir
                mountPath: /src
              command:
              - /bin/bash
              - -c
              - ./examples/container-volume/container.sh
