inputs: []
outputs: []
exec:
  controller:
    id: forge/lib/containers/pod
    config:
      engineId: podman/client
      pod:
        spec: |
          restartPolicy: OnFailure
          containers:
          - image: docker.io/library/node:latest
            name: demo
            command:
            - npx
            - cowsay
            - '--think'
            - Hello from Node in Podman!
