syntax = "proto3";
package forge.api.controller;

import "github.com/s4wave/spacewave/net/daemon/api/api.proto";
import "github.com/aperturerobotics/controllerbus/bus/api/api.proto";
import "github.com/s4wave/spacewave/db/daemon/api/api.proto";
import "github.com/s4wave/spacewave/forge/daemon/api/api.proto";

// Config configures the GRPC API.
message Config {
  // ListenAddr is the address to listen on for connections.
  string listen_addr = 1;

  // DisableBifrostApi disables the bifrost api.
  bool disable_bifrost_api = 2;
  // BifrostApiConfig are bifrost api config options.
  bifrost.api.Config bifrost_api_config = 3;

  // DisableBusApi disables the bus api.
  bool disable_bus_api = 4;
  // BusApiConfig are controller-bus bus api config options.
  bus.api.Config bus_api_config = 5;

  // DisableHydraApi disables the hydra api.
  bool disable_hydra_api = 7;
  // HydraApiConfig are hydra api options.
  hydra.api.Config hydra_api_config = 6;

  // DisableForgeApi disables the forge api.
  bool disable_forge_api = 8;
  // ForgeApiConfig are forge api options.
  forge.api.Config forge_api_config = 9;
}