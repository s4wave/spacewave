syntax = "proto3";
package forge.lib.v86.bun;

import "github.com/s4wave/spacewave/db/block/block.proto";

// Config configures the v86 bun subprocess controller.
// Boots a v86 VM via a bun subprocess with v86fs mounts and runs commands.
//
// Inputs:
//  - rootfs: UnixFS tree for the root filesystem.
//  - bzimage: (optional) BlockRef for the kernel bzImage.
//    If not set, uses the built-in default bzImage.
//  - {mount_name}: additional UnixFS trees for extra mounts.
// Outputs:
//  - output: UnixFS tree captured from the output directory.
message Config {
  // BzImageRef is a block reference to the kernel bzImage.
  // If empty, uses the default built-in bzImage.
  .block.BlockRef bz_image_ref = 1;
  // Mounts maps mount paths to input names.
  // Each entry maps a guest path (e.g. "/opt/toolchain") to the name of an
  // input that provides a UnixFS tree to mount there.
  map<string, string> mounts = 2;
  // Commands is the list of shell commands to run in the guest.
  // Executed sequentially. Exits on first non-zero exit code.
  repeated string commands = 3;
  // OutputDir is the guest directory to capture as the output UnixFS tree.
  // Defaults to "/output" if empty.
  string output_dir = 4;
  // MemoryMb is the VM memory size in megabytes.
  // Defaults to 256 if zero.
  uint32 memory_mb = 5;
  // BunVersion is the bun version to use.
  // If empty, uses the default version from autobun.
  string bun_version = 6;
  // StateDir is the directory for autobun state (downloaded bun binary).
  // If empty, uses a default under the working directory.
  string state_dir = 7;
  // ScriptDir is the directory containing boot.ts and its dependencies.
  // If set, boot.ts is run from this directory (imports resolve via bun).
  // If empty, the embedded boot.ts is written to a temp directory.
  string script_dir = 8;
  // RootfsTarPath is the path to a rootfs.tar file for the guest root filesystem.
  // Loaded via TarFSCursor and served as the v86fs root mount (name="").
  // The VM boots directly from v86fs instead of 9p.
  string rootfs_tar_path = 9;
}
