syntax = "proto3";
package plugin.host.controller;

// Config is the plugin host controller configuration.
message Config {
  // EngineId is the world engine id to attach to.
  string engine_id = 1;
  // ObjectKey is the PluginHost object to attach to.
  // If not exists, waits for it to exist.
  //
  // Reads linked PluginManifest objects.
  string object_key = 2;
  // PeerId is the peer ID to use for world transactions.
  string peer_id = 3;
  // VolumeId is the volume ID to tell plugins to use on the host.
  // Note: the rpc_volume_server must be running with this ID.
  string volume_id = 4;
  // VolumeServiceId is the service ID to tell plugins to use for volume_id.
  string volume_service_id = 5;
}
