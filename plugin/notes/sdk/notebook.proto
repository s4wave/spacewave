syntax = "proto3";
package notes;

import "github.com/s4wave/spacewave/plugin/notes/proto/notebook.proto";

service NotebookResourceService {
  rpc WatchNotebook(WatchNotebookRequest)
    returns (stream WatchNotebookResponse);
  rpc AddSource(AddSourceRequest)
    returns (AddSourceResponse);
  rpc RemoveSource(RemoveSourceRequest)
    returns (RemoveSourceResponse);
  rpc ReorderSources(ReorderSourcesRequest)
    returns (ReorderSourcesResponse);
}

// WatchNotebookRequest is the request for WatchNotebook.
message WatchNotebookRequest {}

// WatchNotebookResponse is the response for WatchNotebook.
message WatchNotebookResponse {
  // Notebook is the current notebook state.
  Notebook notebook = 1;
}

// AddSourceRequest is the request for AddSource.
message AddSourceRequest {
  // Source is the source to add.
  NotebookSource source = 1;
}

// AddSourceResponse is the response for AddSource.
message AddSourceResponse {}

// RemoveSourceRequest is the request for RemoveSource.
message RemoveSourceRequest {
  // Index is the source index to remove.
  uint32 index = 1;
}

// RemoveSourceResponse is the response for RemoveSource.
message RemoveSourceResponse {}

// ReorderSourcesRequest is the request for ReorderSources.
message ReorderSourcesRequest {
  // Order is the new index ordering.
  repeated uint32 order = 1;
}

// ReorderSourcesResponse is the response for ReorderSources.
message ReorderSourcesResponse {}
