# Used as an example program while debugging / developing Bldr.
# type: project.ProjectConfig
id: bundle-js-vite

start:
  plugins:
    - app
    - web

manifests:
  web:
    builder:
      id: bldr/web/plugin/compiler
      config:
        delveAddr: wait

  app:
    builder:
      id: bldr/plugin/compiler/js
      rev: 1
      config:
        webPluginId: web

        modules:
        - kind: JS_MODULE_KIND_FRONTEND
          path: ./example/example.tsx
          # match the root
          webViewParentId:
            empty: true

        # webPkgs externalizes packages
        webPkgs:
          - id: lucide-react

        # configure the configset to apply on startup
        configSet:
          app:
            id: bldr/example/demo

        hostConfigSet:
          demo-bucket:
            id: hydra/bucket/setup
            config:
              applyBucketConfigs:
              - volumeIdList: ["devtool"]
                config: {'id': 'demo-bucket'}
