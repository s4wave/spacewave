      // SyncFileHandle is an example of a object implementing the SyncOPFSFile interface
      class SyncFileHandle {
        constructor(content) {
          // Initialize handleContents with the provided content
          this.handleContents = new TextEncoder().encode(content)
        }

        close() {
          // Method to close the handle (not applicable in this mock context)
        }

        flush() {
          // Method to flush the handle (not applicable in this mock context)
        }

        getSize() {
          // Return the current size of the handleContents
          return this.handleContents.length
        }

        read(buffer, options = { at: 0 }) {
          const { at } = options
          let readBytes = 0

          // Ensure the buffer is an instance of ArrayBufferView
          if (!(buffer instanceof Uint8Array)) {
            buffer = new Uint8Array(buffer)
          }

          for (
            let i = 0;
            i < buffer.length && at + i < this.handleContents.length;
            i++
          ) {
            buffer[i] = this.handleContents[at + i]
            readBytes++
          }

          return readBytes
        }

        truncate(to) {
          if (to < this.handleContents.length) {
            this.handleContents = this.handleContents.slice(0, to)
          } else {
            // If truncating to a larger size, extend the buffer with zeros.
            let extendedBuffer = new Uint8Array(to)
            extendedBuffer.set(this.handleContents, 0)
            this.handleContents = extendedBuffer
          }
        }

        write(buffer, options = { at: 0 }) {
          const { at } = options
          if (!(buffer instanceof Uint8Array)) {
            buffer = new Uint8Array(buffer)
          }

          if (at + buffer.length > this.handleContents.length) {
            // Extend handleContents if necessary
            let newContents = new Uint8Array(at + buffer.length)
            newContents.set(this.handleContents, 0) // Copy existing content
            this.handleContents = newContents
          }

          for (let i = 0; i < buffer.length; i++) {
            this.handleContents[at + i] = buffer[i]
          }

          return buffer.length
        }
      }

      class XtermStdio extends Fd {
        /*:: term: Terminal*/

        constructor(term /*: Terminal*/) {
          super()
          this.term = term
        }
        fd_write(
          view8 /*: Uint8Array*/,
          iovs /*: [wasi.Iovec]*/,
        ) /*: {ret: number, nwritten: number}*/ {
          let nwritten = 0
          for (let iovec of iovs) {
            console.log(
              iovec.buf_len,
              iovec.buf_len,
              view8.slice(iovec.buf, iovec.buf + iovec.buf_len),
            )
            let buffer = view8.slice(iovec.buf, iovec.buf + iovec.buf_len)
            let txt = new TextDecoder().decode(buffer)
            console.log(txt)
            this.term.writeln(txt)
            // this.term.writeUtf8(buffer)
            nwritten += iovec.buf_len
          }
          return { ret: 0, nwritten }
        }
      }

      ;(async function () {
        term.writeln('\x1B[93mDownloading\x1B[0m')
        let wasm = await WebAssembly.compileStreaming(fetch('demo.wasm'))
        term.writeln('\x1B[93mInstantiating\x1B[0m')

        async function load_external_file(path) {
          return new File(
            await (await (await fetch(path)).blob()).arrayBuffer(),
          )
        }

        // FileSystemSyncAccessHandle
        let args = ['demo.wasm']
        let env = []
        let fds = [
          new XtermStdio(term),
          new XtermStdio(term),
          new XtermStdio(term),
          new PreopenDirectory('/', {
            'test.sock': new SyncOPFSFile(
              new SyncFileHandle('hello world from sync file handle'),
            ),
            'hello.txt': new File(
              new TextEncoder('utf-8').encode(`Hello world!\n`),
            ),
            demo: new Directory(
              await (async function () {
                let dir = {}
                for (let file of ['main.go', 'build.bash', 'run.bash']) {
                  dir[file] = await load_external_file(file)
                }
                return dir
              })(),
            ),
          }),
          new PreopenDirectory('/tmp', {}),
          new PreopenDirectory('/example', {
            'world.txt': new File(
              new TextEncoder('utf-8').encode(
                `This file is not visible in / because it is in a separate fd\n`,
              ),
            ),
          }),
        ]

        let w = new WASI(args, env, fds, { debug: true })

        let inst = await WebAssembly.instantiate(wasm, {
          wasi_snapshot_preview1: strace(w.wasiImport, ['fd_prestat_get']),
        })
        term.writeln('\x1B[93mExecuting\x1B[0m')
        console.log(inst.exports)
        try {
          w.start(inst)
        } catch (e) {
          term.writeln(e)
        }
        term.writeln('\x1B[92mDone\x1B[0m')

        console.log(fds)
