syntax = "proto3";
package forge.target;

import "github.com/aperturerobotics/controllerbus/controller/configset/proto/configset.proto";
import "github.com/aperturerobotics/forge/value/value.proto";

// Target contains a desired Task target configuration.
message Target {
  // Inputs is the mapping of inputs.
  repeated Input inputs = 1;
  // Outputs is the mapping of outputs.
  repeated Output outputs = 2;
  // Exec is the execution pass configuration.
  Exec exec = 3;
}

// Input contains configuration for a target task input.
message Input {
  // Name is the unique name of the input.
  string name = 1;
  // InputType is the type of input.
  InputType input_type = 2;

  // ObjectKey is the object key to lookup.
  // InputType_WORLD_OBJECT
  string object_key = 3;
  // ObjectRev is the minimum object revision to wait for.
  // If zero, returns any revision of the object.
  // InputType_WORLD_OBJECT
  string object_rev = 4;

  // Value is the in-line value for the input.
  // InputType_VALUE
  .forge.value.Value value = 5;
}

// InputType is the list of possible input types.
enum InputType {
  // InputType_UNKNOWN is the zero output type.
  InputType_UNKNOWN = 0;
  // InputType_WORLD_OBJECT waits for a world object to exist, then uses the
  // ObjectRef referenced by the world object as the input value.
  InputType_WORLD_OBJECT = 1;
  // InputType_VALUE is an in-line value input.
  InputType_VALUE = 2;
}

// Output contains configuration of a target task output.
// This specifies where to get the Output value from.
message Output {
  // Name is the unique name of the output.
  string name = 1;
  // OutputType is the type of output.
  OutputType output_type = 2;
  // ObjectKey is the object key to set with the output.
  // The object will be updated when the Task completes.
  string object_key = 3;

  // ExecOutput is the name of the exec output to mount.
  // OutputType_EXEC
  string exec_output = 4;
  // Value is an in-line output value.
  // OutputType_VALUE
  .forge.value.Value value = 5;
}

// OutputType is the list of possible output types.
enum OutputType {
  // OutputType_UNKNOWN is the zero output type.
  OutputType_UNKNOWN = 0;
  // OutputType_EXEC is an output value mounted from an exec instance.
  OutputType_EXEC = 1;
  // OutputType_VALUE is an in-line output value (specified in the target).
  OutputType_VALUE = 2;
}

// Exec contains target execution configuration.
message Exec {
  // Disable is a flag to ignore the below contents and inhibit the exec step.
  bool disable = 1;
  // Controller indicates to run a controllerbus controller.
  .configset.proto.ControllerConfig controller = 2;
}

// ValueSet is the set of values satisfying inputs/outputs of a target.
message ValueSet {
  // Inputs is the set of inputs.
  // Unique by the "name" field.
  repeated .forge.value.Value inputs = 1;
  // Outputs is the set of outputs.
  // Unique by the "name" field.
  repeated .forge.value.Value outputs = 2;
}