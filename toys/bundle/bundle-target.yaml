yarn:
  inputs: []
  outputs: []
  exec:
    controller:
      id: forge/lib/containers/pod/1
      config:
        engineId: podman/client
        pod:
          spec: |
            restartPolicy: OnFailure
            containers:
            - image: docker.io/library/node:latest
              name: yarn
              command:
              - npx
              - yarn
              - install
