repo-bldr:
  inputs: []
  outputs:
    - name: repo
      outputType: OutputType_EXEC
      execOutput: "repo"
  exec:
    controller:
      config:
        objectKey: "repo/bldr"
        cloneOpts:
          url: "../../"
        worktreeOpts:
          objectKey: "repo/bldr/worktree"
          workdirRef:
            objectKey: "repo/bldr/workdir"
          createWorkdir: true
      id: forge/lib/git/clone/1

yarn:
  inputs:
  - name: workdir
    inputType: InputType_WORLD_OBJECT
    worldObject:
      objectKey: repo/bldr/workdir
      objectRev: 1
  outputs: []
  exec:
    controller:
      id: forge/lib/containers/pod/1
      config:
        engineId: podman/client
        pod:
          spec: |
            restartPolicy: OnFailure
            containers:
            - image: docker.io/library/node:latest
              name: yarn
              command:
              - npx
              - yarn
              - install
