syntax = "proto3";
package web.runtime.sw;

import "github.com/aperturerobotics/bldr/web/fetch/fetch.proto";

// ServiceWorkerHost is exposed by the Go Runtime for the Worker to call.
//
// Implements FetchService.
service ServiceWorkerHost {
  // Fetch proxies a Fetch request with a streaming response.
  rpc Fetch(stream .web.fetch.FetchRequest) returns (stream .web.fetch.FetchResponse) {}
}

